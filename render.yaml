services:
  # ── Flask Backend ────────────────────────────────────────────────────────────
  - type: web
    name: securax-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt

    # gunicorn.conf.py sets: workers=1, threads=4, timeout=600, bind=0.0.0.0:$PORT
    # Single worker is intentional — SQLite allows only one writer at a time.
    startCommand: gunicorn -c gunicorn.conf.py app:app

    healthCheckPath: /health

    envVars:
      - key: FLASK_ENV
        value: production

      - key: PYTHON_VERSION
        value: "3.11.9"

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_ORIGINS
        # After first deploy, replace with the exact frontend URL from Render dashboard
        value: https://securax-frontend.onrender.com

      - key: DB_PATH
        # Add a Persistent Disk (Render dashboard → Disks, mount at /var/data).
        # Without the disk this is ignored and securax.db resets on each deploy.
        value: /var/data/securax.db

      - key: GEMINI_API_KEY
        sync: false

      - key: SECURAX_ADMIN_PASSWORD
        sync: false

      - key: SECURAX_ANALYST_PASSWORD
        sync: false

  # ── React Frontend (Static Site — always free on Render) ─────────────────────
  - type: static
    name: securax-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: NODE_VERSION
        value: "20"

      - key: VITE_API_BASE_URL
        # Must match the backend service name: securax-backend → securax-backend.onrender.com
        value: https://securax-backend.onrender.com

    routes:
      # SPA routing — all paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
